name: Ballotbook - Voting Log
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Ballotbook-VotingLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ballotbook-VotingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.votelog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ballotbook-VotingLog/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Ballotbook-VotingLog/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  Ballotbook-VotingLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ballotbook-VotingLogTests
    dependencies:
      - target: Ballotbook-VotingLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  Ballotbook-VotingLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ballotbook-VotingLogUITests
    dependencies:
      - target: Ballotbook-VotingLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Ballotbook-VotingLog:
    build:
      targets:
        Ballotbook-VotingLog: all
    test:
      targets:
        - Ballotbook-VotingLogTests
        - Ballotbook-VotingLogUITests
    run:
      config: Debug
